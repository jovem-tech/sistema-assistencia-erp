<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assistencia Mobile PWA</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 8px 0;
      line-height: 1.5;
    }
    code {
      background: #e2e8f0;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Assistencia Mobile PWA</h1>
    <p>O frontend mobile separado foi adicionado em <code>/mobile-app</code> (Next.js).</p>
    <p>Para desenvolvimento, rode o app com <code>npm run dev</code> dentro de <code>mobile-app</code>.</p>
    <p>A API integrada ao ERP ja esta disponivel em <code>/api/v1</code>.</p>
  </section>
</body>
</html>
